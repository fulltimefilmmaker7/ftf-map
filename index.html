<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

<div id="ftf-map-wrap" style="border-radius:12px;overflow:hidden;border:1px solid #222;font-family:sans-serif;">

  <div style="background:#0a0a0a;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
    <div style="font-size:12px;font-weight:600;color:#fff;letter-spacing:0.1em;text-transform:uppercase;">FTF — World Map of Members</div>
    <div style="display:flex;gap:20px;">
      <div style="font-size:12px;color:#777;">Members: <b id="ftf-cnt" style="color:#C9A96E;font-weight:600;">32,989</b></div>
      <div style="font-size:12px;color:#777;">Countries: <b id="ftf-ctry" style="color:#C9A96E;font-weight:600;">94</b></div>
    </div>
  </div>

  <div id="ftf-map" style="width:100%;height:480px;"></div>
  <div id="ftf-drag-hint" style="display:none;background:#1a1a1a;padding:8px 16px;text-align:center;font-size:12px;color:#C9A96E;border-top:1px solid #333;">
    📍 Drag the pin to your exact location, then click <b>+ Add My Pin</b>
  </div>

  <div style="background:#0a0a0a;padding:16px;border-top:1px solid #222;">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">
      <div>
        <div style="font-size:11px;color:#777;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.05em;">Your Name *</div>
        <input id="ftf-name" placeholder="Full name" style="width:100%;background:#161616;border:1px solid #333;border-radius:6px;padding:9px 12px;font-size:13px;color:#fff;outline:none;box-sizing:border-box;">
      </div>
      <div>
        <div style="font-size:11px;color:#777;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.05em;">Email Address *</div>
        <input id="ftf-email" type="email" placeholder="you@email.com" style="width:100%;background:#161616;border:1px solid #333;border-radius:6px;padding:9px 12px;font-size:13px;color:#fff;outline:none;box-sizing:border-box;">
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px;">
      <div>
        <div style="font-size:11px;color:#777;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.05em;">Country *</div>
        <select id="ftf-country" style="width:100%;background:#161616;border:1px solid #333;border-radius:6px;padding:9px 12px;font-size:13px;color:#fff;outline:none;box-sizing:border-box;">
          <option value="">Select country...</option>
        </select>
      </div>
      <div>
        <div style="font-size:11px;color:#777;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.05em;">State / Region</div>
        <select id="ftf-state" style="width:100%;background:#161616;border:1px solid #333;border-radius:6px;padding:9px 12px;font-size:13px;color:#fff;outline:none;box-sizing:border-box;" disabled>
          <option value="">Select state...</option>
        </select>
      </div>
      <div>
        <div style="font-size:11px;color:#777;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.05em;">City *</div>
        <select id="ftf-city" style="width:100%;background:#161616;border:1px solid #333;border-radius:6px;padding:9px 12px;font-size:13px;color:#fff;outline:none;box-sizing:border-box;" disabled>
          <option value="">Select city...</option>
        </select>
      </div>
    </div>
    <input type="hidden" id="ftf-lat" value="">
    <input type="hidden" id="ftf-lng" value="">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">
      <p id="ftf-msg" style="font-size:12px;color:#C9A96E;margin:0;min-height:16px;"></p>
      <button id="ftf-btn" onclick="ftfAddPin()" style="background:#c50000;border:none;border-radius:6px;padding:10px 24px;font-size:13px;color:#fff;font-weight:600;cursor:pointer;white-space:nowrap;">+ Add My Pin</button>
    </div>
  </div>

</div>

<hr style="border:none;border-top:1px solid #333;margin:48px 0;">
<p style="font-family:sans-serif;color:#888;font-size:13px;margin-bottom:8px;"><b style="color:#ccc;">Original Member Map (Legacy)</b> — for older members who already added their pin here.</p>
<div style="text-align:left;">
  <a href="https://www.google.com/maps/d/u/2/edit?mid=13y6TcB-EvBkDaVpF1l4fjYB9S1noB9sM&ll=31.684999945979676%2C-79.33222721436138&z=4" target="_blank" style="padding:10px 22px;font-size:14px;background-color:#333;color:#fff;text-decoration:none;border-radius:30px;display:inline-block;" rel="noopener noreferrer">View Old Member Map</a>
</div>

<script>
(function() {
  var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw8WU2vObMNnzM9K1oBk1JzlezvNgRQ98BIVGM9SzxcdYpCim2pAV-TQArizDshzJtBNw/exec';
  var BASE_MEMBERS = 32989;
  var BASE_COUNTRIES = 94;
  var countrySet = {};
  var dragMarker = null; // the draggable preview pin

  function setMsg(msg, err) {
    var el = document.getElementById('ftf-msg');
    el.textContent = msg;
    el.style.color = err ? '#ff6b6b' : '#C9A96E';
  }
  function getEl(id) { return document.getElementById(id); }

  // --- MAP ---
  var map = L.map('ftf-map', {
    zoomControl: true,
    scrollWheelZoom: false,
    worldCopyJump: false,
    maxBounds: [[-90,-180],[90,180]],
    maxBoundsViscosity: 1.0,
    minZoom: 2
  }).setView([20, 10], 2);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO',
    subdomains: 'abcd',
    maxZoom: 19,
    noWrap: true,
    bounds: [[-90,-180],[90,180]]
  }).addTo(map);

  function makeIcon(gold, draggable) {
    var size = draggable ? 18 : (gold ? 13 : 8);
    var color = draggable ? '#ff6b00' : (gold ? '#C9A96E' : '#c50000');
    var shadow = draggable ? '0 0 0 3px rgba(255,107,0,0.3)' : '0 0 4px rgba(0,0,0,0.5)';
    return L.divIcon({
      className: '',
      html: '<div style="width:'+size+'px;height:'+size+'px;border-radius:50%;background:'+color+';border:2px solid #fff;box-shadow:'+shadow+';cursor:'+(draggable?'grab':'default')+';"></div>',
      iconSize: [size,size], iconAnchor: [size/2,size/2]
    });
  }

  function addMarker(name, city, country, lat, lng, gold) {
    L.marker([lat,lng], {icon: makeIcon(gold, false)})
      .addTo(map)
      .bindPopup('<div style="font-family:sans-serif;"><b style="color:#fff;font-size:13px;">'+name+'</b><br><span style="color:#C9A96E;font-size:12px;">'+(city?city+', ':'')+country+'</span></div>');
    countrySet[country] = true;
    if (gold) {
      var c = parseInt(getEl('ftf-cnt').textContent.replace(/,/g,'')) || BASE_MEMBERS;
      getEl('ftf-cnt').textContent = (c+1).toLocaleString();
      getEl('ftf-ctry').textContent = Math.max(parseInt(getEl('ftf-ctry').textContent)||BASE_COUNTRIES, Object.keys(countrySet).length);
    }
  }

  // --- DRAGGABLE PREVIEW PIN ---
  function placeDragPin(lat, lng) {
    if (dragMarker) { map.removeLayer(dragMarker); }
    dragMarker = L.marker([lat, lng], {
      icon: makeIcon(false, true),
      draggable: true,
      zIndexOffset: 1000
    }).addTo(map);
    dragMarker.bindPopup('<span style="font-size:12px;color:#fff;">Drag me to your exact location</span>').openPopup();
    dragMarker.on('dragend', function(e) {
      var pos = e.target.getLatLng();
      getEl('ftf-lat').value = pos.lat;
      getEl('ftf-lng').value = pos.lng;
    });
    getEl('ftf-lat').value = lat;
    getEl('ftf-lng').value = lng;
    getEl('ftf-drag-hint').style.display = 'block';
  }

  // --- LOAD PINS ---
  fetch(SCRIPT_URL + '?action=get')
    .then(function(r){ return r.json(); })
    .then(function(rows){
      rows.forEach(function(r){
        addMarker(r.name, r.city, r.country, parseFloat(r.lat), parseFloat(r.lng), false);
        countrySet[r.country] = true;
      });
      getEl('ftf-cnt').textContent = (BASE_MEMBERS + rows.length).toLocaleString();
      getEl('ftf-ctry').textContent = Math.max(BASE_COUNTRIES, Object.keys(countrySet).length);
    })
    .catch(function(){ console.warn('Could not load pins'); });

  // --- COUNTRY DROPDOWN ---
  var countries = [
    ['AF','Afghanistan'],['AL','Albania'],['DZ','Algeria'],['AR','Argentina'],['AU','Australia'],
    ['AT','Austria'],['BD','Bangladesh'],['BE','Belgium'],['BR','Brazil'],['BG','Bulgaria'],
    ['CA','Canada'],['CL','Chile'],['CN','China'],['CO','Colombia'],['HR','Croatia'],
    ['CZ','Czech Republic'],['DK','Denmark'],['EG','Egypt'],['EE','Estonia'],['FI','Finland'],
    ['FR','France'],['DE','Germany'],['GH','Ghana'],['GR','Greece'],['HU','Hungary'],
    ['IN','India'],['ID','Indonesia'],['IE','Ireland'],['IL','Israel'],['IT','Italy'],
    ['JP','Japan'],['JO','Jordan'],['KE','Kenya'],['KR','South Korea'],['KW','Kuwait'],
    ['LB','Lebanon'],['LT','Lithuania'],['LV','Latvia'],['MY','Malaysia'],['MX','Mexico'],
    ['MA','Morocco'],['NL','Netherlands'],['NZ','New Zealand'],['NG','Nigeria'],['NO','Norway'],
    ['PK','Pakistan'],['PE','Peru'],['PH','Philippines'],['PL','Poland'],['PT','Portugal'],
    ['QA','Qatar'],['RO','Romania'],['RU','Russia'],['SA','Saudi Arabia'],['RS','Serbia'],
    ['SG','Singapore'],['SK','Slovakia'],['ZA','South Africa'],['ES','Spain'],['LK','Sri Lanka'],
    ['SE','Sweden'],['CH','Switzerland'],['TW','Taiwan'],['TH','Thailand'],['TN','Tunisia'],
    ['TR','Turkey'],['UA','Ukraine'],['AE','UAE'],['GB','United Kingdom'],['US','United States'],
    ['UY','Uruguay'],['VN','Vietnam'],['YE','Yemen'],['ZM','Zambia'],['ZW','Zimbabwe'],
    ['NP','Nepal'],['MM','Myanmar'],['KZ','Kazakhstan'],['UZ','Uzbekistan'],['EC','Ecuador'],
    ['BO','Bolivia'],['PY','Paraguay'],['VE','Venezuela'],['CR','Costa Rica'],['PA','Panama'],
    ['GT','Guatemala'],['HN','Honduras'],['SV','El Salvador'],['DO','Dominican Republic'],
    ['CU','Cuba'],['JM','Jamaica'],['TT','Trinidad and Tobago'],['CI','Ivory Coast'],
    ['CM','Cameroon'],['SN','Senegal'],['ET','Ethiopia'],['TZ','Tanzania'],['UG','Uganda'],
    ['MZ','Mozambique'],['AO','Angola'],['MG','Madagascar'],['NA','Namibia'],['BW','Botswana'],
    ['IS','Iceland'],['LU','Luxembourg'],['MT','Malta'],['CY','Cyprus'],['FJ','Fiji'],
    ['GE','Georgia'],['AM','Armenia'],['AZ','Azerbaijan'],['BH','Bahrain'],['OM','Oman'],
  ];
  countries.sort(function(a,b){ return a[1].localeCompare(b[1]); });
  var csel = getEl('ftf-country');
  countries.forEach(function(c){
    var o = document.createElement('option');
    o.value = c[0]; o.textContent = c[1]; o.setAttribute('data-name', c[1]);
    csel.appendChild(o);
  });

  // --- COUNTRY CHANGE: zoom to country ---
  csel.addEventListener('change', function() {
    var cca2 = this.value;
    var stateSel = getEl('ftf-state');
    var citySel = getEl('ftf-city');
    stateSel.innerHTML = '<option value="">Loading states...</option>';
    stateSel.disabled = true;
    citySel.innerHTML = '<option value="">Select city...</option>';
    citySel.disabled = true;
    getEl('ftf-lat').value = '';
    getEl('ftf-lng').value = '';
    getEl('ftf-drag-hint').style.display = 'none';
    if (dragMarker) { map.removeLayer(dragMarker); dragMarker = null; }
    setMsg('', false);
    if (!cca2) return;
    var countryName = this.options[this.selectedIndex].getAttribute('data-name');

    // Zoom to country
    fetch('https://countriesnow.space/api/v0.1/countries/positions', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({country: countryName})
    })
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (d.data) { map.flyTo([d.data.lat, d.data.long], 5, {duration: 1}); }
    }).catch(function(){});

    // Load states
    fetch('https://countriesnow.space/api/v0.1/countries/states', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({iso2: cca2})
    })
    .then(function(r){ return r.json(); })
    .then(function(d){
      stateSel.innerHTML = '<option value="">Select state...</option>';
      if (d.data && d.data.states && d.data.states.length) {
        d.data.states.forEach(function(s){
          var o = document.createElement('option');
          o.value = s.name; o.textContent = s.name;
          stateSel.appendChild(o);
        });
        stateSel.disabled = false;
      } else {
        stateSel.innerHTML = '<option value="">No states</option>';
        loadCitiesByCountry(countryName);
      }
    })
    .catch(function(){ stateSel.innerHTML = '<option value="">Could not load</option>'; });
  });

  // --- STATE CHANGE: zoom to state area ---
  getEl('ftf-state').addEventListener('change', function() {
    var state = this.value;
    var countryEl = getEl('ftf-country');
    var countryName = countryEl.options[countryEl.selectedIndex].getAttribute('data-name');
    var citySel = getEl('ftf-city');
    citySel.innerHTML = '<option value="">Loading cities...</option>';
    citySel.disabled = true;
    getEl('ftf-lat').value = '';
    getEl('ftf-lng').value = '';
    if (dragMarker) { map.removeLayer(dragMarker); dragMarker = null; }
    getEl('ftf-drag-hint').style.display = 'none';
    setMsg('', false);
    if (!state) return;

    // Zoom to state
    fetch('https://nominatim.openstreetmap.org/search?q=' + encodeURIComponent(state + ', ' + countryName) + '&format=json&limit=1', {headers:{'Accept-Language':'en'}})
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (d.length) { map.flyTo([d[0].lat, d[0].lon], 7, {duration: 1}); }
    }).catch(function(){});

    // Load cities
    fetch('https://countriesnow.space/api/v0.1/countries/state/cities', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({country: countryName, state: state})
    })
    .then(function(r){ return r.json(); })
    .then(function(d){
      citySel.innerHTML = '<option value="">Select city...</option>';
      if (d.data && d.data.length) {
        d.data.forEach(function(city){
          var o = document.createElement('option');
          o.value = city; o.textContent = city;
          citySel.appendChild(o);
        });
        citySel.disabled = false;
      } else {
        citySel.innerHTML = '<option value="">No cities found</option>';
      }
    })
    .catch(function(){ citySel.innerHTML = '<option value="">Could not load</option>'; });
  });

  function loadCitiesByCountry(countryName) {
    var citySel = getEl('ftf-city');
    citySel.innerHTML = '<option value="">Loading cities...</option>';
    citySel.disabled = true;
    fetch('https://countriesnow.space/api/v0.1/countries/cities', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({country: countryName})
    })
    .then(function(r){ return r.json(); })
    .then(function(d){
      citySel.innerHTML = '<option value="">Select city...</option>';
      if (d.data && d.data.length) {
        d.data.forEach(function(city){
          var o = document.createElement('option');
          o.value = city; o.textContent = city;
          citySel.appendChild(o);
        });
        citySel.disabled = false;
      }
    });
  }

  // --- CITY CHANGE: geocode + zoom + place draggable pin ---
  getEl('ftf-city').addEventListener('change', async function() {
    var city = this.value;
    if (!city) return;
    var countryEl = getEl('ftf-country');
    var countryName = countryEl.options[countryEl.selectedIndex].getAttribute('data-name');
    var cc = countryEl.value.toLowerCase();
    var state = getEl('ftf-state').value;
    getEl('ftf-lat').value = '';
    getEl('ftf-lng').value = '';
    if (dragMarker) { map.removeLayer(dragMarker); dragMarker = null; }
    getEl('ftf-drag-hint').style.display = 'none';
    setMsg('Locating ' + city + '...', false);
    try {
      var q = city + (state ? ', ' + state : '') + ', ' + countryName;
      var geo = await fetch('https://nominatim.openstreetmap.org/search?q=' + encodeURIComponent(q) + '&format=json&limit=1&countrycodes=' + cc, {headers:{'Accept-Language':'en'}});
      var gd = await geo.json();
      if (gd.length) {
        var lat = parseFloat(gd[0].lat);
        var lng = parseFloat(gd[0].lon);
        map.flyTo([lat, lng], 12, {duration: 1.2});
        placeDragPin(lat, lng);
        setMsg('✓ Drag the orange pin to your exact spot', false);
      } else {
        var pos = await fetch('https://countriesnow.space/api/v0.1/countries/positions', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({country: countryName})
        });
        var pd = await pos.json();
        if (pd.data) {
          map.flyTo([pd.data.lat, pd.data.long], 6, {duration: 1});
          placeDragPin(pd.data.lat, pd.data.long);
          setMsg('✓ Drag the orange pin to your exact location', false);
        } else {
          setMsg('Could not locate city. Try another.', true);
        }
      }
    } catch(e) {
      setMsg('Location lookup failed. Try again.', true);
    }
  });

  // --- ADD PIN ---
  window.ftfAddPin = async function() {
    var name = getEl('ftf-name').value.trim();
    var email = getEl('ftf-email').value.trim();
    var countryEl = getEl('ftf-country');
    var countryName = countryEl.selectedIndex > 0 ? countryEl.options[countryEl.selectedIndex].getAttribute('data-name') : '';
    var state = getEl('ftf-state').value;
    var city = getEl('ftf-city').value;
    var lat = parseFloat(getEl('ftf-lat').value);
    var lng = parseFloat(getEl('ftf-lng').value);

    if (!name) { setMsg('Please enter your name.', true); return; }
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { setMsg('Please enter a valid email.', true); return; }
    if (!countryName) { setMsg('Please select your country.', true); return; }
    if (!city) { setMsg('Please select your city.', true); return; }
    if (!lat || !lng) { setMsg('Please wait for location to load.', true); return; }

    var btn = getEl('ftf-btn');
    btn.textContent = 'Saving...';
    btn.disabled = true;
    setMsg('Adding your pin...', false);

    try {
      var saveUrl = SCRIPT_URL + '?action=add' +
        '&name=' + encodeURIComponent(name) +
        '&email=' + encodeURIComponent(email) +
        '&country=' + encodeURIComponent(countryName) +
        '&state=' + encodeURIComponent(state) +
        '&city=' + encodeURIComponent(city) +
        '&lat=' + lat + '&lng=' + lng;

      var ifrm = document.createElement('iframe');
      ifrm.style.display = 'none';
      ifrm.src = saveUrl;
      document.body.appendChild(ifrm);
      await new Promise(function(resolve){ setTimeout(resolve, 2000); });
      document.body.removeChild(ifrm);

      if (dragMarker) { map.removeLayer(dragMarker); dragMarker = null; }
      getEl('ftf-drag-hint').style.display = 'none';
      addMarker(name, city, countryName, lat, lng, true);
      map.flyTo([lat, lng], 10, {duration: 1});
      setMsg('Your pin has been added! Welcome to the FTF world map!', false);

      getEl('ftf-name').value = '';
      getEl('ftf-email').value = '';
      getEl('ftf-country').value = '';
      getEl('ftf-state').innerHTML = '<option value="">Select state...</option>';
      getEl('ftf-state').disabled = true;
      getEl('ftf-city').innerHTML = '<option value="">Select city...</option>';
      getEl('ftf-city').disabled = true;
      getEl('ftf-lat').value = '';
      getEl('ftf-lng').value = '';
    } catch(e) {
      setMsg('Something went wrong. Please try again.', true);
    }
    btn.textContent = '+ Add My Pin';
    btn.disabled = false;
  };

})();
</script>
